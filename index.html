<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>象棋對戰</title>

<style>
  :root{
    --wood-light:#e3bb76;
    --wood-dark:#dcae63;
    --wood-border:#5a3a22;
    --line:#8a5a35;
    --red:#8f1c1c;
    --red-light:#c0392b;
    --black:#161616;
    --black-light:#4a4a4a;
  }
  *{ box-sizing:border-box; }
  html, body{ overflow-x:hidden; }
  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    background: linear-gradient(to right, #1e1e1e 0%, #383632 50%, #1e1e1e 100%);
    font-family:'DFKai-SB','BiauKai','標楷體','KaiTi','STKaiti',serif;
    padding:16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px) + 24px);
    width:100%;
  }

  /* ---------- 大廳畫面 ---------- */
  .lobby-card{
    background:rgba(0,0,0,0.35);
    border:1px solid rgba(232,200,135,0.3);
    border-radius:16px;
    padding:20px 20px;
    width:100%;
    max-width:300px;
    display:flex; flex-direction:column; gap:11px;
    color:#f6ecd9;
    box-shadow:0 0 5px 0 rgba(135,135,135,0.75);
  }
  .lobby-card label{ font-size:13px; color:#999999; letter-spacing:1px; }
  .lobby-card label .label-note{ font-size:10px; color:#888888; letter-spacing:0; white-space:nowrap; }
  .lobby-card input{
    width:100%; padding:9px 12px; border-radius:8px; border:1px solid #6f6d68;
    background:#2b2a27; color:#f6ecd9; font-size:16px; letter-spacing:3px;
    font-family:inherit; text-align:center;
  }
  #seat-code-input{ box-shadow:0 0 5px 0 rgba(135,135,135,0.75); }
  .lobby-card input::placeholder{ color:#8f8d88; opacity:1; }
  .lobby-card input::-webkit-input-placeholder{ color:#8f8d88; opacity:1; }
  .lobby-card input::-moz-placeholder{ color:#8f8d88; opacity:1; }
  .row{ display:flex; gap:8px; }
  .row input{ flex:1; }
  .row.row-align-end{ align-items:flex-end; }
  .field-col{ display:flex; flex-direction:column; gap:6px; flex:1; }
  .field-label-center{ text-align:center; }
  .btn{
    border:none; border-radius:999px; cursor:pointer; letter-spacing:2px;
    font-family:inherit; font-size:14px; padding:10px 18px;
    display:inline-flex; align-items:center; justify-content:center; text-align:center;
  }
  .btn-primary{ background:#c91c56; color:#efecea; border:1px solid #efefef; box-shadow:0 0 5px 0 rgba(135,135,135,0.75); }
  .btn-primary:hover{ background:#d33a34; }
  #join-btn{ align-self:center; width:80%; border-radius:22px; }
  .btn-secondary{
    background:#363430; color:#c9caca; border:1px solid #bcbab7;
    box-shadow:0 0 5px 0 rgba(135,135,135,0.75);
  }
  .btn-secondary:hover{ background:#454135; }
  .hint{ font-size:12px; color:#666666; line-height:1.6; }
  .error{ color:#ff8a80; font-size:13px; min-height:16px; }

  /* ---------- 對局畫面 ---------- */
  .status-bar{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center;
    background:rgba(0,0,0,0.35);
    padding:10px 22px; border-radius:999px;
    color:#cbb28a; font-size:15px; letter-spacing:2px;
  }
  .turn-dot{ width:13px; height:13px; border-radius:50%; box-shadow:0 0 8px currentColor; flex-shrink:0; }
  .turn-dot.red{ background:var(--red); color:var(--red); }
  .turn-dot.black{ background:var(--black); color:#999; }
  .badge{
    background:rgba(232,200,135,0.15); border:1px solid rgba(232,200,135,0.4);
    padding:3px 12px; border-radius:999px; font-size:13px;
  }
  .seat-code-note{ color:#a8967a; font-size:12px; text-align:center; max-width:420px; }

  .board-scale-outer{
    position:relative;
    display:flex;
    justify-content:center;
    width:100%;
    overflow:hidden;
  }
  .board{
    position:relative;
    background: transparent;
    border:none;
    padding:6px 22px;
    display:inline-block;
    transform-origin: top center;
    flex-shrink:0;
    will-change: transform;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }
  .board.disabled{ filter:grayscale(0.15) brightness(0.92); pointer-events:none; }
  .coord-row{ display:flex; }
  .coord-row span{
    display:flex; align-items:center; justify-content:center;
    color:var(--wood-border); font-size:14px; letter-spacing:1px;
    opacity:0.75;
  }
  .grid-wrap{ position:relative; }
  .grid-svg{ position:absolute; top:0; left:0; pointer-events:none; }
  .grid{ position:relative; display:grid; }
  .cell{ position:relative; display:flex; align-items:center; justify-content:center; }
  .cell .dot{ width:12px; height:12px; border-radius:50%; background:rgba(90,58,34,0.4); }
  .cell.capture-target::after{
    content:''; position:absolute; inset:3px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.75); pointer-events:none;
  }

  /* 棋子：立體光澤圓子，紅方深棗紅、黑方近黑，白色文字 */
  .piece{
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:700; cursor:pointer; user-select:none;
    transition: transform .12s ease;
    z-index:5;
    color:#fdf6e8;
    text-shadow:0 1px 1px rgba(0,0,0,0.5);
    font-family:'DFKai-SB','BiauKai','標楷體','KaiTi','STKaiti',serif;
  }
  .piece.red{
    background: radial-gradient(circle at 32% 28%, var(--red-light) 0%, var(--red) 55%, #5c0f0f 100%);
    border:1px solid #4a0d0d;
    box-shadow:0 3px 5px rgba(0,0,0,0.45), inset 0 1px 2px rgba(255,255,255,0.35), inset 0 -3px 5px rgba(0,0,0,0.35);
  }
  .piece.black{
    background: radial-gradient(circle at 32% 28%, var(--black-light) 0%, var(--black) 55%, #000 100%);
    border:1px solid #000;
    box-shadow:0 3px 5px rgba(0,0,0,0.45), inset 0 1px 2px rgba(255,255,255,0.2), inset 0 -3px 5px rgba(0,0,0,0.5);
  }
  .piece.selected{ transform:scale(1.14); box-shadow:0 0 0 3px #ffb238, 0 3px 6px rgba(0,0,0,0.5); }
  .piece.in-check{ box-shadow:0 0 0 3px #ff3b30, 0 3px 6px rgba(0,0,0,0.5); }
  .piece.not-turn{ cursor:default; }

  /* 圖片版棋子：蓋掉原本的漸層底色與文字樣式，改用圖片背景 */
  .piece.piece-img{
    background-image: none;
    background-size: cover;
    background-position: center;
    background-color: transparent;
    border: none;
    box-shadow: 4px 4px 5px rgba(0,0,0,0.4);
    color: transparent;
    text-shadow: none;
  }
  .piece.piece-img.selected{
    box-shadow: 4px 4px 5px rgba(0,0,0,0.4), 0 0 0 3px #ffb238;
  }
  .piece.piece-img.in-check{
    box-shadow: 4px 4px 5px rgba(0,0,0,0.4), 0 0 0 3px #ff3b30;
  }

  .message{ min-height:20px; color:#ffd479; font-size:15px; font-weight:600; text-align:center; }

  /* ---------- 對局結束彈窗（顯示在棋盤正中間） ---------- */
  .game-over-overlay{
    display:none;
    position:absolute; inset:0;
    background:rgba(0,0,0,0.55);
    align-items:center; justify-content:center;
    z-index:50;
    padding:16px;
  }
  .game-over-box{
    background:#363430;
    border:1px solid #bcbab7;
    border-radius:16px;
    padding:24px 26px;
    color:#f6ecd9;
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:16px;
    align-items:center;
    max-width:80%;
    width:280px;
    box-shadow:
      0 0 5px rgba(135,135,135,0.75),
      0 12px 34px rgba(0,0,0,0.55);
  }
  .game-over-box .game-over-title{ font-size:17px; font-weight:700; color:#cc9a48; line-height:1.5; }
  .game-over-box .game-over-actions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .game-over-box .game-over-actions .btn-secondary{ color:#c9caca; }

  .actions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  #copy-msg{ font-size:12px; color:#8fdc8f; min-height:14px; }
  #conn-status{ font-size:12px; color:#a8967a; min-height:14px; text-align:center; }

  /* ---------- 桌機版放大 ---------- */
  @media (min-width: 768px) {
    .lobby-card {
      max-width: 390px;
      padding: 26px;
      gap: 15px;
    }
    .lobby-card label { font-size: 16px; }
    .lobby-card label .label-note { font-size: 13px; }
    .lobby-card input { font-size: 20px; padding: 12px 16px; }
    .lobby-card .btn { font-size: 18px; padding: 12px 24px; }
    #join-btn { border-radius: 28px; }
    .hint { font-size: 15px; }

    #game-view {
      max-width: 720px !important;
    }
    .status-bar { font-size: 20px; padding: 14px 32px; }
    .badge { font-size: 18px; padding: 6px 18px; }
    .turn-dot { width: 18px; height: 18px; }
    .seat-code-note { font-size: 16px; max-width: 600px; }
    .message { font-size: 20px; min-height: 26px; }
    .game-over-box { width: 400px; padding: 34px; gap: 24px; }
    .game-over-box .game-over-title { font-size: 24px; }
    .actions .btn { font-size: 18px; padding: 14px 24px; }
    #copy-msg, #conn-status { font-size: 16px; }
  }
</style>
</head>
<body>

  <!-- ---------- 大廳畫面 ---------- -->
  <div class="lobby-card" id="lobby-view">
    <div>
      <div class="row row-align-end">
        <div class="field-col">
          <label class="field-label-center">房間代碼</label>
          <input id="room-code-input" maxlength="6" placeholder="例如 A1B2" autocomplete="off">
        </div>
        <button class="btn btn-secondary" id="random-code-btn">隨機</button>
      </div>
    </div>
    <div>
      <label>座位碼<span class="label-note">（重新整理頁面想拿回座位才需要，第一次留空）</span></label>
      <input id="seat-code-input" maxlength="8" placeholder="沒有就留空" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="join-btn">加入 / 建立房間</button>
    <div class="error" id="lobby-error"></div>
    <div class="hint">
      把房間代碼傳給朋友，對方輸入相同代碼即可加入這個房間，兩人會自動配對並隨機決定誰紅誰黑。
      加入房間後畫面上會顯示你的座位碼；如果不小心重新整理頁面，把座位碼填回上面欄位即可拿回原本座位。
      房間的紅、黑兩個座位一旦都坐滿，其他人再嘗試加入都會被拒絕；只要其中一方離開房間，就會空出一個位置，讓下一位加入。
    </div>
  </div>

  <!-- ---------- 對局畫面 ---------- -->
  <div id="game-view" style="display:none; flex-direction:column; align-items:center; gap:14px; width:100%; max-width:520px;">
    <div class="status-bar">
      <span class="badge" id="room-badge">房間 ----</span>
      <span class="badge" id="seat-badge">你是：－</span>
      <span class="turn-dot" id="turn-dot"></span>
      <span id="turn-text">紅方回合</span>
    </div>
    <div class="seat-code-note" id="seat-code-note"></div>

    <div class="board-scale-outer" id="board-scale-outer">
      <div class="board" id="board-wrap">
        <div class="coord-row" id="coord-top"></div>
        <div class="grid-wrap">
          <svg class="grid-svg" id="grid-svg"></svg>
          <div class="grid" id="grid"></div>
        </div>
        <div class="coord-row" id="coord-bottom"></div>
      </div>
      <div class="game-over-overlay" id="game-over-overlay">
        <div class="game-over-box">
          <div class="game-over-title" id="game-over-title"></div>
          <div class="game-over-actions" id="game-over-actions"></div>
        </div>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="actions">
      <button class="btn btn-secondary" id="resign-btn">認輸</button>
      <button class="btn btn-secondary" id="draw-offer-btn">求和</button>
      <button class="btn btn-secondary" id="copy-share-link-btn">分享房間連結</button>
      <button class="btn btn-secondary" id="copy-link-btn">複製房間代碼</button>
      <button class="btn btn-secondary" id="restart-btn" style="display:none;">重新開始一局</button>
      <button class="btn btn-secondary" id="leave-btn">離開房間</button>
    </div>
    <div id="copy-msg"></div>
    <div id="conn-status"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot, runTransaction
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBP7t-6-ytdr8qJd_yv6iZjuqtsZ9urc0w",
    authDomain: "chinese-chess-90a20.firebaseapp.com",
    projectId: "chinese-chess-90a20",
    storageBucket: "chinese-chess-90a20.firebasestorage.app",
    messagingSenderId: "952241228752",
    appId: "1:952241228752:web:9ebf4401c2545a901947d5",
    measurementId: "G-LB2JFM9999"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const ROOMS_COLLECTION = 'xiangqiRooms';

  const CELL = 48, COLS = 9, ROWS = 10;
  const pieceNamesRed   = { R:'車', N:'馬', M:'相', G:'仕', K:'帥', P:'兵', C:'炮' };
  const pieceNamesBlack = { R:'車', N:'馬', M:'象', G:'士', K:'將', P:'卒', C:'砲' };

  const PIECE_IMG_BASE = 'https://raw.githubusercontent.com/YOZORA2926/chinese-chess/main/Image/Pieces/';
  const PIECE_IMG_VERSION = '20260719';
  function pieceImageUrl(p){
    const color = colorOf(p) === 'red' ? 'red' : 'black';
    const type = typeOf(p);
    return PIECE_IMG_BASE + color + '-' + type + '.png' + '?v=' + PIECE_IMG_VERSION;
  }

  function initialBoard(){
    return [
      ['r','n','m','g','k','g','m','n','r'],
      ['','','','','','','','',''],
      ['','c','','','','','','c',''],
      ['p','','p','','p','','p','','p'],
      ['','','','','','','','',''],
      ['','','','','','','','',''],
      ['P','','P','','P','','P','','P'],
      ['','C','','','','','','C',''],
      ['','','','','','','','',''],
      ['R','N','M','G','K','G','M','N','R']
    ];
  }

  function inBounds(r,c){ return r>=0 && r<ROWS && c>=0 && c<COLS; }
  function colorOf(p){ if(!p) return null; return p === p.toUpperCase() ? 'red' : 'black'; }
  function typeOf(p){ return p.toUpperCase(); }
  function cloneBoard(b){ return b.map(row => row.slice()); }

  function findKing(b, side){
    const code = side === 'red' ? 'K' : 'k';
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(b[r][c] === code) return [r,c];
    return null;
  }

  function pseudoMoves(b, r, c){
    const p = b[r][c];
    if(!p) return [];
    const side = colorOf(p);
    const type = typeOf(p);
    const moves = [];
    const own = (rr,cc) => b[rr][cc] && colorOf(b[rr][cc]) === side;

    if(type === 'R'){
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      for(const [dr,dc] of dirs){
        let rr=r+dr, cc=c+dc;
        while(inBounds(rr,cc)){
          if(!b[rr][cc]) moves.push([rr,cc]);
          else { if(!own(rr,cc)) moves.push([rr,cc]); break; }
          rr+=dr; cc+=dc;
        }
      }
    } else if(type === 'C'){
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      for(const [dr,dc] of dirs){
        let rr=r+dr, cc=c+dc, screen=false;
        while(inBounds(rr,cc)){
          if(!screen){
            if(!b[rr][cc]) moves.push([rr,cc]);
            else screen = true;
          } else if(b[rr][cc]){
            if(!own(rr,cc)) moves.push([rr,cc]);
            break;
          }
          rr+=dr; cc+=dc;
        }
      }
    } else if(type === 'N'){
      const steps = [
        {dr:-2,dc:-1,leg:[-1,0]}, {dr:-2,dc:1,leg:[-1,0]},
        {dr:2,dc:-1,leg:[1,0]},   {dr:2,dc:1,leg:[1,0]},
        {dr:-1,dc:-2,leg:[0,-1]}, {dr:1,dc:-2,leg:[0,-1]},
        {dr:-1,dc:2,leg:[0,1]},   {dr:1,dc:2,leg:[0,1]},
      ];
      for(const s of steps){
        const lr=r+s.leg[0], lc=c+s.leg[1];
        if(inBounds(lr,lc) && b[lr][lc]) continue;
        const tr=r+s.dr, tc=c+s.dc;
        if(inBounds(tr,tc) && !own(tr,tc)) moves.push([tr,tc]);
      }
    } else if(type === 'M'){
      const steps = [[-2,-2],[-2,2],[2,-2],[2,2]];
      for(const [dr,dc] of steps){
        const er=r+dr/2, ec=c+dc/2, tr=r+dr, tc=c+dc;
        if(!inBounds(tr,tc)) continue;
        if(b[er][ec]) continue;
        if(side==='red' && tr<5) continue;
        if(side==='black' && tr>4) continue;
        if(!own(tr,tc)) moves.push([tr,tc]);
      }
    } else if(type === 'G'){
      const steps = [[-1,-1],[-1,1],[1,-1],[1,1]];
      for(const [dr,dc] of steps){
        const tr=r+dr, tc=c+dc;
        if(!inBounds(tr,tc) || tc<3 || tc>5) continue;
        if(side==='red' && tr<7) continue;
        if(side==='black' && tr>2) continue;
        if(!own(tr,tc)) moves.push([tr,tc]);
      }
    } else if(type === 'K'){
      const steps = [[-1,0],[1,0],[0,-1],[0,1]];
      for(const [dr,dc] of steps){
        const tr=r+dr, tc=c+dc;
        if(!inBounds(tr,tc) || tc<3 || tc>5) continue;
        if(side==='red' && tr<7) continue;
        if(side==='black' && tr>2) continue;
        if(!own(tr,tc)) moves.push([tr,tc]);
      }
    } else if(type === 'P'){
      const fwd = side==='red' ? -1 : 1;
      const crossed = side==='red' ? r<=4 : r>=5;
      const cand = [[fwd,0]];
      if(crossed){ cand.push([0,-1]); cand.push([0,1]); }
      for(const [dr,dc] of cand){
        const tr=r+dr, tc=c+dc;
        if(inBounds(tr,tc) && !own(tr,tc)) moves.push([tr,tc]);
      }
    }
    return moves;
  }

  function isSquareAttacked(b, r, c, bySide){
    for(let rr=0; rr<ROWS; rr++){
      for(let cc=0; cc<COLS; cc++){
        const p = b[rr][cc];
        if(p && colorOf(p) === bySide){
          if(pseudoMoves(b, rr, cc).some(([mr,mc]) => mr===r && mc===c)) return true;
        }
      }
    }
    return false;
  }

  function kingsFacing(b){
    const rk = findKing(b,'red'), bk = findKing(b,'black');
    if(!rk || !bk || rk[1] !== bk[1]) return false;
    const c = rk[1];
    const r1 = Math.min(rk[0], bk[0]), r2 = Math.max(rk[0], bk[0]);
    for(let r=r1+1; r<r2; r++) if(b[r][c]) return false;
    return true;
  }

  function isInCheck(b, side){
    const k = findKing(b, side);
    if(!k) return false;
    return isSquareAttacked(b, k[0], k[1], side==='red' ? 'black' : 'red');
  }

  function legalMoves(b, r, c){
    const p = b[r][c];
    if(!p) return [];
    const side = colorOf(p);
    const legal = [];
    for(const [tr,tc] of pseudoMoves(b, r, c)){
      const nb = cloneBoard(b);
      nb[tr][tc] = nb[r][c];
      nb[r][c] = '';
      if(isInCheck(nb, side)) continue;
      if(kingsFacing(nb)) continue;
      legal.push([tr,tc]);
    }
    return legal;
  }

  function hasAnyLegalMove(b, side){
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const p=b[r][c];
      if(p && colorOf(p)===side && legalMoves(b,r,c).length>0) return true;
    }
    return false;
  }

  function pieceLabel(p){
    const t = typeOf(p);
    return colorOf(p)==='red' ? pieceNamesRed[t] : pieceNamesBlack[t];
  }

  function genCode(len){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s='';
    for(let i=0;i<len;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  function freshRoomState(){
    return {
      board: initialBoard(),
      turn: 'red',
      gameOver: false,
      message: '',
      redId: null,
      blackId: null,
      drawOfferBy: null
    };
  }

  function boardToRows(board){ return board.map(row => row.join(',')); }
  function rowsToBoard(rows){ return rows.map(row => row.split(',')); }

  function encodeRoom(state){
    return {
      boardRows: boardToRows(state.board),
      turn: state.turn,
      gameOver: state.gameOver,
      message: state.message || '',
      redId: state.redId || null,
      blackId: state.blackId || null,
      drawOfferBy: state.drawOfferBy || null
    };
  }
  function decodeRoom(data){
    return {
      board: rowsToBoard(data.boardRows),
      turn: data.turn,
      gameOver: data.gameOver,
      message: data.message || '',
      redId: data.redId || null,
      blackId: data.blackId || null,
      drawOfferBy: data.drawOfferBy || null
    };
  }

  async function getRoom(code){
    try{
      const snap = await getDoc(doc(db, ROOMS_COLLECTION, code));
      if(!snap.exists()) return null;
      return decodeRoom(snap.data());
    } catch(e){
      console.error('讀取房間失敗', e);
      return null;
    }
  }

  async function setRoom(code, state){
    try{
      await setDoc(doc(db, ROOMS_COLLECTION, code), encodeRoom(state));
      return true;
    } catch(e){
      console.error('房間同步失敗', e);
      return false;
    }
  }

  const chineseNums = ['一','二','三','四','五','六','七','八','九'];
  let lastCoordFlip = null;

  function renderCoordLabels(flipped){
    if(flipped === lastCoordFlip) return;
    lastCoordFlip = flipped;
    const coordTop = document.getElementById('coord-top');
    const coordBottom = document.getElementById('coord-bottom');
    coordTop.style.width = (COLS*CELL)+'px';
    coordBottom.style.width = (COLS*CELL)+'px';
    coordTop.innerHTML = '';
    coordBottom.innerHTML = '';
    for(let dc=0; dc<COLS; dc++){
      const c = flipped ? (COLS-1-dc) : dc;
      const digitLabel = String(c+1);
      const hanziLabel = chineseNums[COLS-1-c];

      const top = document.createElement('span');
      top.style.width = CELL+'px'; top.style.height = '22px';
      top.textContent = flipped ? hanziLabel : digitLabel;

      const bottom = document.createElement('span');

    }
  }
  renderCoordLabels(false);

  const BOARD_LINE_COLOR = '#878787';

  function crossMarkSvg(cx0, cy0, hasLeft, hasRight){
    const g = 4, len = 6;
    const seg = (x1,y1,x2,y2) => `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${BOARD_LINE_COLOR}" stroke-width="1.5" stroke-linecap="round"/>`;
    let s = '';
    if(hasLeft){
      s += seg(cx0-g, cy0-g, cx0-g-len, cy0-g);
      s += seg(cx0-g, cy0-g, cx0-g, cy0-g-len);
      s += seg(cx0-g, cy0+g, cx0-g-len, cy0+g);
      s += seg(cx0-g, cy0+g, cx0-g, cy0+g+len);
    }
    if(hasRight){
      s += seg(cx0+g, cy0-g, cx0+g+len, cy0-g);
      s += seg(cx0+g, cy0-g, cx0+g, cy0-g-len);
      s += seg(cx0+g, cy0+g, cx0+g+len, cy0+g);
      s += seg(cx0+g, cy0+g, cx0+g, cy0+g+len);
    }
    return s;
  }

  function drawGridLines(){
    const cx = c => c*CELL + CELL/2;
    const cy = r => r*CELL + CELL/2;
    const s = `stroke="${BOARD_LINE_COLOR}" stroke-width="1.5" stroke-linecap="round"`;
    let svg = '';

    for(let r=0;r<ROWS;r++){
      svg += `<line x1="${cx(0)}" y1="${cy(r)}" x2="${cx(COLS-1)}" y2="${cy(r)}" ${s}/>`;
    }
    for(let c=0;c<COLS;c++){
      if(c===0 || c===COLS-1){
        svg += `<line x1="${cx(c)}" y1="${cy(0)}" x2="${cx(c)}" y2="${cy(ROWS-1)}" ${s}/>`;
      } else {
        svg += `<line x1="${cx(c)}" y1="${cy(0)}" x2="${cx(c)}" y2="${cy(4)}" ${s}/>`;
        svg += `<line x1="${cx(c)}" y1="${cy(5)}" x2="${cx(c)}" y2="${cy(ROWS-1)}" ${s}/>`;
      }
    }
    svg += `<line x1="${cx(3)}" y1="${cy(0)}" x2="${cx(5)}" y2="${cy(2)}" ${s}/>`;
    svg += `<line x1="${cx(5)}" y1="${cy(0)}" x2="${cx(3)}" y2="${cy(2)}" ${s}/>`;
    svg += `<line x1="${cx(3)}" y1="${cy(7)}" x2="${cx(5)}" y2="${cy(9)}" ${s}/>`;
    svg += `<line x1="${cx(5)}" y1="${cy(7)}" x2="${cx(3)}" y2="${cy(9)}" ${s}/>`;

    const markerPoints = [
      [2,1],[2,7],[7,1],[7,7],
      [3,0],[3,2],[3,4],[3,6],[3,8],
      [6,0],[6,2],[6,4],[6,6],[6,8]
    ];
    for(const [r,c] of markerPoints){
      svg += crossMarkSvg(cx(c), cy(r), c>0, c<COLS-1);
    }

    const midY = (cy(4)+cy(5))/2 + 6;
    svg += `<text x="${cx(1)+8}" y="${midY}" font-size="19" fill="${BOARD_LINE_COLOR}" font-weight="700" text-anchor="middle">楚 河</text>`;
    svg += `<text x="${cx(7)-8}" y="${midY}" font-size="19" fill="${BOARD_LINE_COLOR}" font-weight="700" text-anchor="middle">漢 界</text>`;
    svgEl.innerHTML = svg;
  }
  drawGridLines();

  const boardScaleOuter = document.getElementById('board-scale-outer');

  function fitBoard(){
    if(!boardWrap || boardWrap.offsetParent === null) return;
    boardWrap.style.transform = 'none';
    void boardWrap.offsetHeight;
    const naturalWidth = boardWrap.offsetWidth;
    const naturalHeight = boardWrap.offsetHeight;
    if(!naturalWidth) return;
    const available = boardScaleOuter.clientWidth || naturalWidth;
    const scale = Math.min(1, available / naturalWidth);
    boardWrap.style.transform = `scale(${scale})`;
    boardScaleOuter.style.height = (naturalHeight * scale) + 'px';
  }
  window.addEventListener('resize', fitBoard);
  window.addEventListener('orientationchange', () => setTimeout(fitBoard, 100));

  let myId = null;
  let roomCode = null;
  let mySeat = null;
  let board = initialBoard();
  let turn = 'red';
  let gameOver = false;
  let message = '';
  let drawOfferBy = null;
  let selected = null;
  let unsubscribeRoom = null;
  let busy = false;
  let pendingMoveAnim = null;
  let redIdG = null;
  let blackIdG = null;
  let lastDrawOfferBy = null;
  let dismissedGameOverMessage = null;

  function seatLabel(s){
    if(s==='red') return '紅方';
    if(s==='black') return '黑方';
    return '－';
  }

  function bothSeated(){
    return !!(redIdG && blackIdG);
  }

  function findMoveDiff(oldBoard, newBoard){
    const diffs = [];
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(oldBoard[r][c] !== newBoard[r][c]) diffs.push([r,c]);
      }
    }
    if(diffs.length !== 2) return null;
    const [a,b] = diffs;
    const aNowEmpty = newBoard[a[0]][a[1]] === '';
    const from = aNowEmpty ? a : b;
    const to = aNowEmpty ? b : a;
    if(newBoard[to[0]][to[1]] === '') return null;
    return { r1: from[0], c1: from[1], r2: to[0], c2: to[1] };
  }

  function animateMove(el, fromR, fromC, toR, toC, flipped){
    const fromDR = flipped ? (ROWS-1-fromR) : fromR;
    const fromDC = flipped ? (COLS-1-fromC) : fromC;
    const toDR = flipped ? (ROWS-1-toR) : toR;
    const toDC = flipped ? (COLS-1-toC) : toC;
    const dx = (fromDC - toDC) * CELL;
    const dy = (fromDR - toDR) * CELL;
    if(dx === 0 && dy === 0) return;
    el.style.transition = 'none';
    el.style.transform = `translate(${dx}px, ${dy}px)`;
    void el.offsetWidth;
    el.style.transition = 'transform 0.22s ease';
    el.style.transform = 'translate(0px, 0px)';
    el.addEventListener('transitionend', () => {
      el.style.transition = '';
      el.style.transform = '';
    }, { once: true });
  }

  function applyRoomToLocal(room){
    const diff = findMoveDiff(board, room.board);
    if(diff){
      pendingMoveAnim = diff;
    }
    board = room.board;
    turn = room.turn;
    gameOver = room.gameOver;
    message = room.message || '';
    drawOfferBy = room.drawOfferBy || null;
    redIdG = room.redId || null;
    blackIdG = room.blackId || null;
    if(room.redId === myId) mySeat = 'red';
    else if(room.blackId === myId) mySeat = 'black';
    else {
      stopListening();
      roomCode = null; myId = null; mySeat = null; selected = null;
      gameView.style.display = 'none';
      lobbyView.style.display = 'flex';
      lobbyError.textContent = '你已離開這個房間。';
      return;
    }
    selected = null;
    maybeShowDrawOfferDialog();
    renderGame();
  }

  function maybeShowDrawOfferDialog(){
    const isPlayer = (mySeat === 'red' || mySeat === 'black');
    const isNewIncomingOffer = isPlayer && !gameOver && drawOfferBy && drawOfferBy !== mySeat && drawOfferBy !== lastDrawOfferBy;
    lastDrawOfferBy = drawOfferBy;
    if(!isNewIncomingOffer) return;
    const accepted = window.confirm(`${seatLabel(drawOfferBy)}提出求和，是否同意？`);
    if(accepted) acceptDrawOffer();
    else respondToDrawOffer(null);
  }

  async function attemptJoin(){
    lobbyError.textContent = '';
    const code = roomCodeInput.value.trim().toUpperCase();
    if(!code){ lobbyError.textContent = '請先輸入或產生房間代碼'; return; }

    const enteredSeat = seatCodeInput.value.trim();
    const candidateId = enteredSeat || genCode(6);

    joinBtn.disabled = true;
    joinBtn.textContent = '連線中...';

    let room, assignedSeat = null;

    try{
      const docRef = doc(db, ROOMS_COLLECTION, code);
      const result = await runTransaction(db, async (tx) => {
        const snap = await tx.get(docRef);
        let data = snap.exists() ? decodeRoom(snap.data()) : freshRoomState();

        if(data.redId === candidateId){
          assignedSeat = 'red';
        } else if(data.blackId === candidateId){
          assignedSeat = 'black';
        } else if(data.redId && data.blackId){
          assignedSeat = null;
        } else if(!data.redId && !data.blackId){
          assignedSeat = Math.random() < 0.5 ? 'red' : 'black';
          data[assignedSeat + 'Id'] = candidateId;
        } else if(!data.redId){
          data.redId = candidateId;
          assignedSeat = 'red';
        } else {
          data.blackId = candidateId;
          assignedSeat = 'black';
        }

        if(assignedSeat) tx.set(docRef, encodeRoom(data));
        return data;
      });
      room = result;
    } catch(e){
      console.error(e);
      joinBtn.disabled = false;
      joinBtn.textContent = '加入 / 建立房間';
      const code = e && e.code ? `（${e.code}）` : '';
      lobbyError.textContent = `連線 Firebase 失敗${code}：${e && e.message ? e.message : e}`;
      return;
    }

    if(!assignedSeat){
      joinBtn.disabled = false;
      joinBtn.textContent = '加入 / 建立房間';
      lobbyError.textContent = '這個房間已經滿了，請稍後再試，或請房間裡的人離開後再加入。';
      return;
    }

    roomCode = code;
    myId = candidateId;
    mySeat = assignedSeat;
    board = room.board; turn = room.turn; gameOver = room.gameOver; message = room.message || '';
    redIdG = room.redId || null;
    blackIdG = room.blackId || null;
    drawOfferBy = room.drawOfferBy || null;
    lastDrawOfferBy = drawOfferBy;
    selected = null;

    joinBtn.disabled = false;
    joinBtn.textContent = '加入 / 建立房間';

    roomBadge.textContent = '房間 ' + roomCode;
    lobbyView.style.display = 'none';
    gameView.style.display = 'flex';

    seatCodeNote.textContent = `你的座位碼：${myId}（重新整理頁面或想在別的裝置接續操作，把這組代碼填入「座位碼」欄位即可拿回原本座位；不會自動記住，避免同帳號多裝置互相搶座位）`;

    renderGame();
    startListening();
    requestAnimationFrame(fitBoard);
  }

  function startListening(){
    stopListening();
    connStatusEl.textContent = '即時連線中...';
    unsubscribeRoom = onSnapshot(doc(db, ROOMS_COLLECTION, roomCode), (docSnap) => {
        connStatusEl.textContent = '';
        if(!docSnap.exists()) return;
        if(busy) return;
        applyRoomToLocal(decodeRoom(docSnap.data()));
      }, (err) => {
        console.error('即時連線發生錯誤', err);
        connStatusEl.textContent = '連線中斷，正在嘗試恢復...';
      });
  }

  function stopListening(){
    if(unsubscribeRoom){ unsubscribeRoom(); unsubscribeRoom = null; }
  }

  function renderGame(){
    seatBadge.textContent = '你是：' + seatLabel(mySeat);
    turnDotEl.className = 'turn-dot ' + turn;
    const waitingForOpponent = !bothSeated();
    const canAct = (mySeat === turn) && !gameOver && !waitingForOpponent;
    boardWrap.classList.toggle('disabled', !canAct);

    let turnLine;
    if(waitingForOpponent){
      turnLine = '等待對手加入...';
    } else {
      turnLine = (turn==='red' ? '紅方回合' : '黑方回合');
      if(isInCheck(board, turn)) turnLine += '（將軍！）';
      if(!gameOver) turnLine += (mySeat === turn ? '（換你了）' : '（等待對方）');
    }
    turnTextEl.textContent = turnLine;

    messageEl.textContent = message || '';
    restartBtn.style.display = (gameOver && (mySeat==='red'||mySeat==='black')) ? 'inline-block' : 'none';

    const isPlayer = (mySeat === 'red' || mySeat === 'black');
    resignBtn.style.display = (isPlayer && !gameOver) ? 'inline-block' : 'none';
    drawOfferBtn.style.display = (isPlayer && !gameOver && !drawOfferBy) ? 'inline-block' : 'none';

    renderGameOverPopup(isPlayer);

    const flipped = (mySeat === 'black');
    renderCoordLabels(flipped);

    gridEl.innerHTML = '';
    const legal = (selected && canAct) ? legalMoves(board, selected[0], selected[1]) : [];
    const checkSide = ['red','black'].find(s => isInCheck(board, s));
    const kingPos = checkSide ? findKing(board, checkSide) : null;

    for(let dr=0; dr<ROWS; dr++){
      for(let dc=0; dc<COLS; dc++){
        const r = flipped ? (ROWS-1-dr) : dr;
        const c = flipped ? (COLS-1-dc) : dc;

        const cell = document.createElement('div');
        cell.className = 'cell';
        const isTarget = legal.some(([mr,mc]) => mr===r && mc===c);
        const p = board[r][c];

        if(p){
          const piece = document.createElement('div');
          piece.className = `piece piece-img ${colorOf(p)}` + (canAct ? '' : ' not-turn');
          piece.style.backgroundImage = `url("${pieceImageUrl(p)}")`;
          if(selected && selected[0]===r && selected[1]===c) piece.classList.add('selected');
          if(kingPos && kingPos[0]===r && kingPos[1]===c) piece.classList.add('in-check');
          piece.addEventListener('click', (e) => { e.stopPropagation(); onCellClick(r,c); });
          cell.appendChild(piece);
          if(isTarget) cell.classList.add('capture-target');

          if(pendingMoveAnim && pendingMoveAnim.r2 === r && pendingMoveAnim.c2 === c){
            animateMove(piece, pendingMoveAnim.r1, pendingMoveAnim.c1, r, c, flipped);
            pendingMoveAnim = null;
          }
        } else if(isTarget){
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        cell.addEventListener('click', () => onCellClick(r,c));
        gridEl.appendChild(cell);
      }
    }
  }

  function renderGameOverPopup(isPlayer){
    if(!gameOver || !message || dismissedGameOverMessage === message){
      gameOverOverlayEl.style.display = 'none';
      return;
    }
    gameOverTitleEl.textContent = message;
    gameOverActionsEl.innerHTML = '';

    if(isPlayer){
      const restartBtnInPopup = document.createElement('button');
      restartBtnInPopup.className = 'btn btn-primary';
      restartBtnInPopup.textContent = '重新開始一局';
      restartBtnInPopup.addEventListener('click', () => restartBtn.click());
      gameOverActionsEl.appendChild(restartBtnInPopup);
    }

    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn btn-secondary';
    closeBtn.textContent = '關閉';
    closeBtn.addEventListener('click', () => {
      dismissedGameOverMessage = message;
      gameOverOverlayEl.style.display = 'none';
    });
    gameOverActionsEl.appendChild(closeBtn);

    gameOverOverlayEl.style.display = 'flex';
  }

  async function respondToDrawOffer(newValue){
    busy = true;
    const room = (await getRoom(roomCode)) || freshRoomState();
    room.drawOfferBy = newValue;
    await setRoom(roomCode, room);
    drawOfferBy = newValue;
    busy = false;
    renderGame();
  }

  async function acceptDrawOffer(){
    busy = true;
    const room = (await getRoom(roomCode)) || freshRoomState();
    room.gameOver = true;
    room.message = '雙方同意求和，本局和局！';
    room.drawOfferBy = null;
    await setRoom(roomCode, room);
    gameOver = true; message = room.message; drawOfferBy = null;
    busy = false;
    renderGame();
  }

  function onCellClick(r,c){
    if(gameOver) return;
    if(!bothSeated()) return;
    if(mySeat !== turn) return;
    const p = board[r][c];

    if(selected){
      const [sr,sc] = selected;
      if(sr===r && sc===c){ selected=null; renderGame(); return; }
      const isLegal = legalMoves(board, sr, sc).some(([mr,mc]) => mr===r && mc===c);
      if(isLegal){ makeMove(sr,sc,r,c); return; }
      if(p && colorOf(p)===turn){ selected=[r,c]; renderGame(); return; }
      selected = null; renderGame(); return;
    } else if(p && colorOf(p)===turn){
      selected = [r,c]; renderGame();
    }
  }

  async function makeMove(sr,sc,tr,tc){
    busy = true;
    pendingMoveAnim = { r1: sr, c1: sc, r2: tr, c2: tc };
    const nb = cloneBoard(board);
    nb[tr][tc] = nb[sr][sc];
    nb[sr][sc] = '';
    const nextTurn = turn==='red' ? 'black' : 'red';
    const inCheck = isInCheck(nb, nextTurn);
    const anyMoves = hasAnyLegalMove(nb, nextTurn);
    const label = s => s==='red' ? '紅方' : '黑方';

    let newMessage = '';
    let over = false;
    if(!anyMoves){
      over = true;
      const winner = nextTurn==='red' ? 'black' : 'red';
      newMessage = inCheck
        ? `${label(nextTurn)}被將死，${label(winner)}獲勝！`
        : `${label(nextTurn)}無子可動，${label(winner)}獲勝！`;
    }

    const room = (await getRoom(roomCode)) || freshRoomState();
    room.board = nb;
    room.turn = nextTurn;
    room.gameOver = over;
    room.message = newMessage;
    room.redId = room.redId; room.blackId = room.blackId;
    await setRoom(roomCode, room);

    board = nb; turn = nextTurn; gameOver = over; message = newMessage; selected = null;
    renderGame();
    busy = false;
  }

  restartBtn.addEventListener('click', async () => {
    if(mySeat !== 'red' && mySeat !== 'black') return;
    busy = true;
    const room = (await getRoom(roomCode)) || freshRoomState();
    room.board = initialBoard();
    room.turn = 'red';
    room.gameOver = false;
    room.message = '';
    room.drawOfferBy = null;
    await setRoom(roomCode, room);
    busy = false;
    applyRoomToLocal(room);
  });

  resignBtn.addEventListener('click', async () => {
    if(mySeat !== 'red' && mySeat !== 'black') return;
    if(gameOver) return;
    if(!bothSeated()){ window.alert('對手還沒加入，不能認輸。'); return; }
    const confirmResign = window.confirm('確定要認輸嗎？認輸後這局就結束了。');
    if(!confirmResign) return;
    busy = true;
    const winner = mySeat === 'red' ? 'black' : 'red';
    const room = (await getRoom(roomCode)) || freshRoomState();
    room.gameOver = true;
    room.message = `${seatLabel(mySeat)}認輸，${seatLabel(winner)}獲勝！`;
    room.drawOfferBy = null;
    await setRoom(roomCode, room);
    gameOver = true; message = room.message; drawOfferBy = null;
    lastDrawOfferBy = null;
    busy = false;
    renderGame();
  });

  drawOfferBtn.addEventListener('click', async () => {
    if(mySeat !== 'red' && mySeat !== 'black') return;
    if(gameOver || drawOfferBy) return;
    if(!bothSeated()){ window.alert('對手還沒加入，不能求和。'); return; }
    busy = true;
    const room = (await getRoom(roomCode)) || freshRoomState();
    room.drawOfferBy = mySeat;
    await setRoom(roomCode, room);
    drawOfferBy = mySeat;
    lastDrawOfferBy = mySeat;
    busy = false;
    renderGame();
    window.alert('已送出求和請求，等待對方回應...');
  });

  leaveBtn.addEventListener('click', async () => {
    if(roomCode && mySeat){
      busy = true;
      const room = await getRoom(roomCode);
      if(room){
        if(mySeat === 'red' && room.redId === myId) room.redId = null;
        if(mySeat === 'black' && room.blackId === myId) room.blackId = null;
        room.drawOfferBy = null;
        await setRoom(roomCode, room);
      }
      busy = false;
    }
    stopListening();
    roomCode = null; myId = null; mySeat = null; selected = null;
    gameView.style.display = 'none';
    lobbyView.style.display = 'flex';
    roomCodeInput.value = '';
    seatCodeInput.value = '';
    lobbyError.textContent = '';
  });

  copyLinkBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(roomCode);
      copyMsgEl.textContent = '已複製房間代碼：' + roomCode + '，傳給朋友貼到「房間代碼」欄位即可加入';
    } catch(e){
      copyMsgEl.textContent = '房間代碼：' + roomCode + '（請手動複製）';
    }
    setTimeout(() => { copyMsgEl.textContent = ''; }, 3000);
  });

  function buildShareUrl(code){
    const url = new URL(window.location.href);
    url.search = ''; url.hash = '';
    url.searchParams.set('room', code);
    return url.toString();
  }

  copyShareLinkBtn.addEventListener('click', async () => {
    const shareUrl = buildShareUrl(roomCode);
    try{
      await navigator.clipboard.writeText(shareUrl);
      copyMsgEl.textContent = '已複製分享連結，傳給朋友，對方點開就會自動填好房間代碼';
    } catch(e){
      copyMsgEl.textContent = '分享連結：' + shareUrl + '（請手動複製）';
    }
    setTimeout(() => { copyMsgEl.textContent = ''; }, 4000);
  });

  (function prefillRoomFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const roomFromUrl = params.get('room');
    if(roomFromUrl){
      roomCodeInput.value = roomFromUrl.toUpperCase();
    }
  })();

  randomCodeBtn.addEventListener('click', () => {
    roomCodeInput.value = genCode(4);
  });

  joinBtn.addEventListener('click', attemptJoin);
  roomCodeInput.addEventListener('keydown', (e) => { if(e.key==='Enter') attemptJoin(); });
  seatCodeInput.addEventListener('keydown', (e) => { if(e.key==='Enter') attemptJoin(); });
</script>
</body>
</html>
